name: CI of the Project

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build NodeJS app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Typescript compiler to build project
        run: npm run build
